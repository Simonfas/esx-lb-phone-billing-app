<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regninger</title>
    <link rel="stylesheet" href="billing.css">
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Regninger</h1>
            <p>Se og betal dine åbne regninger</p>
        </div>

        <div class="card">
            <button id="refreshBtn" type="button">Opdater</button>
        </div>

        <div id="statusBox" class="card hidden"></div>

        <div id="billsContainer" class="bills-list">
            <div class="card">Henter regninger...</div>
        </div>
    </div>

    <script>
        const resourceName = "sf_billing";

        const billsContainer = document.getElementById("billsContainer");
        const statusBox = document.getElementById("statusBox");
        const refreshBtn = document.getElementById("refreshBtn");

        async function nuiFetch(endpoint, data = {}) {
            const response = await fetch(`https://${resourceName}/${endpoint}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            return await response.json();
        }

        function showStatus(message, success = false) {
            statusBox.classList.remove("hidden");
            statusBox.textContent = message;
            statusBox.className = success ? "card status success" : "card status error";
        }

        function renderBills(bills) {
            billsContainer.innerHTML = "";

            if (!bills || bills.length === 0) {
                billsContainer.innerHTML = `<div class="card">Du har ingen regninger.</div>`;
                return;
            }

            bills.forEach(bill => {
                const billCard = document.createElement("div");
                billCard.className = "card bill-card";

                billCard.innerHTML = `
                    <div class="bill-top">
                        <div>
                            <h3>${bill.label || "Regning"}</h3>
                            <p>Regning ID: ${bill.id}</p>
                        </div>
                        <div class="amount">${bill.amount} kr.</div>
                    </div>
                    <button type="button" class="pay-btn" data-id="${bill.id}">
                        Betal regning
                    </button>
                `;

                const payBtn = billCard.querySelector(".pay-btn");
                payBtn.addEventListener("click", () => payBill(bill.id));

                billsContainer.appendChild(billCard);
            });
        }

        async function loadBills() {
            billsContainer.innerHTML = `<div class="card">Henter regninger...</div>`;

            try {
                const bills = await nuiFetch("getBills");
                renderBills(bills);
            } catch (error) {
                console.error("loadBills error:", error);
                billsContainer.innerHTML = `<div class="card">Fejl ved hentning af regninger.</div>`;
            }
        }

        async function payBill(billId) {
            try {
                const result = await nuiFetch("payBill", { billId });

                if (result.success) {
                    showStatus(result.message || "Regning betalt.", true);
                    loadBills();
                } else {
                    showStatus(result.message || "Kunne ikke betale regningen.");
                }
            } catch (error) {
                console.error("payBill error:", error);
                showStatus("Der opstod en fejl.");
            }
        }

        refreshBtn.addEventListener("click", loadBills);
        document.addEventListener("DOMContentLoaded", loadBills);
    </script>
</body>
</html>
